name: CI
on:
  pull_request:
  push:
  schedule:
  - cron: '0 10 * * 6'
jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
    steps:
    - uses: actions/checkout@v7
    - uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5.3.0
      with:
        java-version: 17
        distribution: adopt
    - uses: coursier/cache-action@v8
    - uses: sbt/setup-sbt@v1
    - run: sbt
           -v
           --server
           scalafmtCheckAll
           scalafmtSbtCheck
           "+test"
